steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/pms-repo/pms-taskflow:latest', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/pms-repo/pms-taskflow:latest']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'pms-taskflow'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/pms-repo/pms-taskflow:latest'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--max-instances=10'
      - '--min-instances=0'
      - '--timeout=300'
      - '--concurrency=80'
      - '--cpu-boost'
      - '--set-env-vars=GOOGLE_SERVICE_ACCOUNT_EMAIL=ticketsystem@ticketingsystem-498705.iam.gserviceaccount.com'
      - '--set-secrets=GOOGLE_PRIVATE_KEY=GOOGLE_PRIVATE_KEY:latest'
      - '--set-env-vars=GOOGLE_SPREADSHEET_ID=1zwbskE3dTGVNn8EGG6Dx45TorL08zCB9ovLvnGeoEWQ'
      - '--set-secrets=JWT_SECRET=JWT_SECRET:latest'
      - '--set-env-vars=JWT_EXPIRES_IN=7d'
      - '--set-env-vars=BCRYPT_ROUNDS=12'
      - '--set-env-vars=RATE_LIMIT_WINDOW_MS=900000'
      - '--set-env-vars=RATE_LIMIT_MAX_REQUESTS=100'
      - '--set-env-vars=NODE_ENV=production'
